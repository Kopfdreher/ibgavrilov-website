title: Home
icon: home

tabs:
  # --- TAB 1: HERO SECTION ---
  hero:
    label: Hero (Oben)
    icon: image
    columns:
      - width: 1/2
        fields:
          heroTitle:
            label: Hauptüberschrift
            type: text
            placeholder: Planung für Verkehrsanlagen...
          heroSubtitle:
            label: Untertext
            type: textarea
            size: small
          heroBtnPrimary:
            label: Button 1 Text
            type: text
            width: 1/2
          heroBtnSecondary:
            label: Button 2 Text
            type: text
            width: 1/2

      - width: 1/2
        fields:
          heroImage:
            label: Hintergrundbild
            type: files
            layout: cards
            max: 1
            uploads: true
            image:
              cover: true

  # --- TAB 2: FEATURES (WORAUF SIE SICH VERLASSEN KÖNNEN) ---
  features:
    label: Vorteile
    icon: check
    fields:
      featuresHeadline:
        label: Überschrift
        type: text
      featureGrid:
        label: Liste der Vorteile
        type: structure
        fields:
          icon:
            label: FontAwesome Icon (z.B. fas fa-clock)
            type: text
            width: 1/4
          title:
            label: Titel
            type: text
            width: 3/4
          text:
            label: Beschreibung
            type: textarea

  # --- TAB 3: SERVICES (LEISTUNGEN) ---
  services:
    label: Leistungen
    icon: drafting-compass
    fields:
      servicesHeadline:
        label: Überschrift
        type: text
      serviceGrid:
        label: Liste der Leistungen
        type: structure
        fields:
          icon:
            label: Icon Class
            type: text
            width: 1/4
          title:
            label: Titel
            type: text
            width: 3/4
          description:
            label: Beschreibung
            type: textarea
