{{ template_content }}
<section class="datenschutz" style="padding-top: 120px;">
  <div class="container">
    <div class="datenschutz-content">
      <p style="color: var(--primary-color); text-align: center;">
         {{ category }} | {{ date format="d.m.Y" }}
      </p>
      <h1>{{ title }}</h1>
      
      <div class="post-content">
        {{ content | markdown }}
      </div>

      {{ if gallery }}
      <div class="project-gallery" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem;">
        {{ gallery }}
          <a href="{{ url }}" target="_blank">
            <img src="{{ glide:url width='400' }}" alt="{{ alt }}" style="width: 100%; border-radius: 8px;">
          </a>
        {{ /gallery }}
      </div>
      {{ /if }}
      
      <div style="margin-top: 3rem; text-align: center;">
        <a href="/#projekte" class="btn btn-secondary">← Zurück zur Übersicht</a>
      </div>

    </div>
  </div>
</section>
